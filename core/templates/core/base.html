{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light sticky-top custom-navbar">
    <div class="container">
        <a class="navbar-brand" href="{% url 'core:home' %}">Planteer</a>

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" href="{% url 'core:home' %}">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'plants:all_plants' %}">All Plants</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'plants:favorites' %}">Favorites <span id="favorites-count" class="badge bg-danger ms-1" style="display: none;">0</span></a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'plants:search' %}">Search</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'core:contact' %}">Contact</a></li>
                <li class="nav-item ms-lg-2">
                    <a class="btn btn-main btn-sm" href="{% url 'plants:add_plant' %}">+ Add Plant</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-4">
    {% block content %}{% endblock %}
</main>

<footer class="custom-footer text-center">
    <div class="container">
        <p class="mb-2 fw-semibold" style="font-size: 1.1rem;">Planteer</p>
        <p class="mb-0">&copy; 2026 Planteer - Where Plant Lovers Grow Together</p>
    </div>
</footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/main.js' %}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
