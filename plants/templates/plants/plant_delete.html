{% extends 'core/base.html' %}

{% block title %}Delete Plant - Planteer{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-6 col-xl-5">
        
        <!-- Delete Confirmation Card -->
        <div class="card border-0 shadow-lg rounded-4 p-5 text-center" style="background: linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(254, 242, 242, 0.98));">
            
            <!-- Warning Icon -->
            <div class="mb-4">
                <div style="font-size: 5rem; animation: shake 0.5s;">⚠️</div>
            </div>
            
            <!-- Title -->
            <h1 class="fw-bold mb-3" style="font-size: 2.5rem; color: var(--gray-900);">
                Delete Plant?
            </h1>
            
            <!-- Message -->
            <div class="mb-4 p-4 rounded-3" style="background: rgba(239, 68, 68, 0.1); border: 2px solid rgba(239, 68, 68, 0.2);">
                <p class="mb-2" style="font-size: 1.1rem; color: var(--gray-700);">
                    Are you sure you want to permanently delete
                </p>
                <p class="fw-bold mb-0" style="font-size: 1.3rem; color: #dc2626;">
                    "{{ plant.name }}"
                </p>
            </div>
            
            <div class="alert alert-danger border-0 mb-4" style="background: rgba(239, 68, 68, 0.1);">
                <strong>⚠️ Warning:</strong> This action cannot be undone!
            </div>

            <!-- Action Buttons -->
            <form method="POST">
                {% csrf_token %}
                <div class="d-grid gap-3">
                    <button 
                        type="submit" 
                        class="btn btn-danger btn-lg" 
                        style="border-radius: 1rem; font-weight: 600; padding: 1rem;"
                    >
                        🗑️ Yes, Delete Permanently
                    </button>
                    <a 
                        href="{% url 'plants:detail' plant.id %}" 
                        class="btn btn-outline-secondary btn-lg"
                        style="border-radius: 1rem; font-weight: 600; padding: 1rem;"
                    >
                        ← Cancel, Keep Plant
                    </a>
                </div>
            </form>

        </div>

    </div>
</div>

<style>
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    75% { transform: translateX(10px); }
}
</style>

{% endblock %}
